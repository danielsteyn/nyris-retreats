<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>All reviews — Nyris Retreats</title>
<meta name="description" content="Every guest review for this Nyris Retreats property. Sort by recency or rating, filter by star count."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/styles.css?v=82"/>
<script src="/js/theme.js?v=82"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%231F3D2B' d='M4 26 L16 6 L28 26 Z'/%3E%3C/svg%3E"/>
<script>window.__activeNav = "stays";</script>
</head>
<body>
<header id="site-header"></header>

<main>
  <div class="container" style="padding: 1.25rem 1.5rem 0;">
    <a id="reviewsBackLink" href="/search.html" style="font-size: 0.88rem; color: var(--color-stone);">← Back</a>
  </div>
  <div class="container" id="reviewsRoot" style="padding: 1.5rem 1.5rem 4rem;">
    <!-- Populated by reviews.js -->
  </div>
</main>

<footer id="site-footer"></footer>

<style>
.reviews-toolbar {
  display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
  padding: 1rem 0 1.5rem;
  border-top: 1px solid var(--color-line);
  border-bottom: 1px solid var(--color-line);
  margin-bottom: 2rem;
  position: sticky; top: 70px; background: var(--color-cream); z-index: 5;
}
.reviews-toolbar .group {
  display: inline-flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;
}
.reviews-toolbar .group-label {
  font-size: 0.82rem; color: var(--color-stone); margin-right: 0.25rem;
}
.rating-chip {
  padding: 0.4rem 0.85rem; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--color-line); background: white;
  font-size: 0.85rem; color: var(--color-charcoal); font-family: inherit;
  display: inline-flex; align-items: center; gap: 0.3rem;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.rating-chip:hover { border-color: var(--color-stone); }
.rating-chip.active {
  background: var(--color-primary); color: var(--color-cream);
  border-color: var(--color-primary);
}
.review-list-card {
  background: white; border: 1px solid var(--color-line); border-radius: 14px;
  padding: 1.5rem; margin-bottom: 1rem;
}
.review-list-card .review-header {
  display: flex; align-items: center; gap: 0.85rem; margin-bottom: 0.85rem;
}
.review-list-card .avatar {
  width: 44px; height: 44px; border-radius: 999px;
  background: var(--color-sand); color: var(--color-primary);
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 1rem; flex-shrink: 0;
}
.review-list-card .review-author { font-size: 0.95rem; font-weight: 600; }
.review-list-card .review-meta { font-size: 0.82rem; color: var(--color-stone); }
.review-list-card .stars { color: var(--color-accent); letter-spacing: 0.05em; font-size: 0.95rem; margin-bottom: 0.4rem; }
.review-list-card .review-text { font-size: 0.95rem; line-height: 1.65; color: var(--color-charcoal); margin: 0; white-space: pre-wrap; }
.reviews-summary {
  display: flex; align-items: baseline; gap: 0.85rem; flex-wrap: wrap;
  margin: 0.5rem 0 1.5rem;
  font-size: 1.05rem; color: var(--color-charcoal);
}
.reviews-empty {
  padding: 3rem 1.5rem; text-align: center;
  background: var(--color-cream-dark); border-radius: 14px;
  color: var(--color-stone);
}
@media (max-width: 720px) {
  .reviews-toolbar { top: 60px; padding: 0.85rem 0 1rem; }
}
</style>

<script src="/js/data.js?v=82"></script>
<script src="/js/app.js?v=82"></script>
<script src="/js/reviews.js?v=82"></script>
</body>
</html>
